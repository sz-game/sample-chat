<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<title>Live Chat Widget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --accent: #FF6B4A;
    --accent-ink: #4A1B0C;
    --dark: #1E2A38;
    --dark-2: #16202B;
    --bubble-me: #FF6B4A;
    --bubble-other: #2C3B4C;
    --text-light: #E8ECEF;
  }
  * { box-sizing: border-box; }
  body{ margin:0; font-family:'Inter',sans-serif; }

  #lc-launcher{
    position: fixed; right: 24px; bottom: 24px; z-index: 9998;
    width: 58px; height: 58px; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    display:flex; align-items:center; justify-content:center;
    transition: transform .15s ease;
  }
  #lc-launcher:hover{ transform: scale(1.06); }
  #lc-launcher svg{ width:26px; height:26px; }
  #lc-badge{
    position:absolute; top:-2px; right:-2px; background:#E24B4A; color:#fff;
    font-size:10px; font-weight:600; border-radius:50%; width:18px; height:18px;
    display:none; align-items:center; justify-content:center;
  }

  #lc-panel{
    position: fixed; right: 24px; bottom: 94px; z-index: 9999;
    width: 340px; height: 460px; display:none; flex-direction:column;
    background: var(--dark); border-radius: 14px; overflow:hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.45);
  }
  #lc-panel.open{ display:flex; }

  #lc-header{
    padding: 12px 16px; background: var(--dark-2); color: var(--text-light);
    display:flex; align-items:center; justify-content:space-between;
    font-weight:600; font-size:14px;
  }
  #lc-header .lc-status{ display:flex; align-items:center; gap:6px; }
  #lc-header .lc-dot{ width:8px; height:8px; border-radius:50%; background:#4ADE80; }
  #lc-header button{
    background:none; border:none; color:var(--text-light); opacity:.7;
    cursor:pointer; font-size:18px; line-height:1; padding:2px 6px;
  }
  #lc-header button:hover{ opacity:1; }

  #lc-messages{
    flex:1; overflow-y:auto; padding: 14px; display:flex; flex-direction:column; gap:8px;
  }
  #lc-messages:empty::after{
    content: 'Abhi tak koi message nahi. Sab se pehle aap likhein.';
    color: rgba(255,255,255,0.4); font-size:12px; text-align:center; display:block; margin-top:20px;
  }
  .lc-msg{
    max-width: 78%; padding: 8px 12px; border-radius: 14px; font-size:13px; line-height:1.4;
    word-break: break-word; align-self: flex-start;
  }
  .lc-msg.me{ align-self:flex-end; background: var(--bubble-me); color: var(--accent-ink); border-bottom-right-radius:4px; }
  .lc-msg.other{ background: var(--bubble-other); color: var(--text-light); border-bottom-left-radius:4px; }
  .lc-msg .lc-name{ display:block; font-size:10px; font-weight:600; opacity:.7; margin-bottom:2px; }
  .lc-msg .lc-time{ display:block; font-size:9px; opacity:.5; margin-top:3px; text-align:right; }

  #lc-form{
    padding: 10px; background: var(--dark-2); display:flex; gap:8px; align-items:flex-end;
  }
  #lc-form input[type=text]{
    flex:1; border-radius:20px; border:none; padding:9px 14px;
    font-family:'Inter',sans-serif; font-size:13px; background:#2C3B4C; color:var(--text-light);
  }
  #lc-form input[type=text]::placeholder{ color:rgba(255,255,255,0.4); }
  #lc-form button.lc-send{
    background: var(--accent); color:var(--accent-ink); border:none; border-radius:50%;
    width:36px; height:36px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  #lc-form button.lc-send:hover{ filter:brightness(1.05); }
  #lc-name-gate{
    padding: 16px; background: var(--dark); display:flex; flex-direction:column; gap:10px;
    flex:1; align-items:center; justify-content:center;
  }
  #lc-name-gate p{ color:var(--text-light); font-size:13px; margin:0; text-align:center; }
  #lc-name-gate input{
    width:100%; border-radius:8px; border:none; padding:9px 12px; font-size:13px;
    background:#2C3B4C; color:var(--text-light);
  }
  #lc-name-gate button{
    background: var(--accent); color:var(--accent-ink); border:none; border-radius:8px;
    padding:9px; font-weight:600; font-size:13px; cursor:pointer; width:100%;
  }
</style>
</head>
<body>

<button id="lc-launcher" aria-label="Chat kholein">
  <svg viewBox="0 0 24 24" fill="none" stroke="#4A1B0C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  <span id="lc-badge"></span>
</button>

<div id="lc-panel">
  <div id="lc-header">
    <span class="lc-status"><span class="lc-dot"></span> Live chat</span>
    <button id="lc-close" aria-label="Band karein">&times;</button>
  </div>

  <div id="lc-name-gate">
    <p>Chat mein shamil hone ke liye apna naam likhein</p>
    <input type="text" id="lc-name-input" maxlength="20" placeholder="Aapka naam">
    <button id="lc-name-submit">Shamil hon</button>
  </div>

  <div id="lc-messages" style="display:none;"></div>
  <div id="lc-form" style="display:none;">
    <input type="text" id="lc-text-input" maxlength="300" placeholder="Message likhein...">
    <button class="lc-send" id="lc-send-btn" aria-label="Bhejein">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#4A1B0C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, query, orderBy, limit,
    onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // ----- YAHAN APNA FIREBASE CONFIG PASTE KAREIN -----
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDKnJueIviOT1HGEKccWJItk3s8GNckF6I",
    authDomain: "unblockedgame-chat.firebaseapp.com",
    databaseURL: "https://unblockedgame-chat-default-rtdb.firebaseio.com",
    projectId: "unblockedgame-chat",
    storageBucket: "unblockedgame-chat.firebasestorage.app",
    messagingSenderId: "316395679509",
    appId: "1:316395679509:web:6b07fe7216347c8341431c",
    measurementId: "G-YY019HWRCZ"
  };
  // ----------------------------------------------------

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const messagesRef = collection(db, "livechat_messages");

  const BANNED = ['fuck','fuc','fck','madarchod','bhosdi','chutiya','gandu','bkl','saala','harami','loda','randi'];
  function containsBanned(str){
    var s = str.toLowerCase();
    for(var i=0;i<BANNED.length;i++){ if(s.indexOf(BANNED[i]) !== -1) return true; }
    return false;
  }

  const launcher = document.getElementById('lc-launcher');
  const badge = document.getElementById('lc-badge');
  const panel = document.getElementById('lc-panel');
  const closeBtn = document.getElementById('lc-close');
  const nameGate = document.getElementById('lc-name-gate');
  const nameInput = document.getElementById('lc-name-input');
  const nameSubmit = document.getElementById('lc-name-submit');
  const messagesBox = document.getElementById('lc-messages');
  const form = document.getElementById('lc-form');
  const textInput = document.getElementById('lc-text-input');
  const sendBtn = document.getElementById('lc-send-btn');

  let myName = localStorage.getItem('lc_username') || '';
  let unread = 0;
  let panelOpen = false;

  if(myName){ showChat(); }

  launcher.addEventListener('click', function(){
    panelOpen = !panelOpen;
    panel.classList.toggle('open', panelOpen);
    if(panelOpen){ unread = 0; badge.style.display = 'none'; }
  });
  closeBtn.addEventListener('click', function(){
    panelOpen = false;
    panel.classList.remove('open');
  });

  nameSubmit.addEventListener('click', function(){
    const n = nameInput.value.trim();
    if(!n) return;
    myName = n;
    localStorage.setItem('lc_username', n);
    showChat();
  });
  nameInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') nameSubmit.click();
  });

  function showChat(){
    nameGate.style.display = 'none';
    messagesBox.style.display = 'flex';
    form.style.display = 'flex';
    listenForMessages();
  }

  function timeNow(ts){
    if(!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date();
    return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
  }

  function listenForMessages(){
    const q = query(messagesRef, orderBy('ts','asc'), limit(100));
    onSnapshot(q, function(snap){
      messagesBox.innerHTML = '';
      snap.forEach(function(doc){
        const m = doc.data();
        const el = document.createElement('div');
        el.className = 'lc-msg ' + (m.author === myName ? 'me' : 'other');
        el.innerHTML =
          (m.author === myName ? '' : '<span class="lc-name"></span>') +
          '<span class="lc-body"></span>' +
          '<span class="lc-time"></span>';
        if(m.author !== myName) el.querySelector('.lc-name').textContent = m.author;
        el.querySelector('.lc-body').textContent = m.text;
        el.querySelector('.lc-time').textContent = timeNow(m.ts);
        messagesBox.appendChild(el);
      });
      messagesBox.scrollTop = messagesBox.scrollHeight;
      if(!panelOpen && snap.docChanges().some(c => c.type === 'added')){
        unread++;
        badge.textContent = unread;
        badge.style.display = 'flex';
      }
    });
  }

  sendBtn.addEventListener('click', sendMessage);
  textInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter') sendMessage();
  });

  async function sendMessage(){
    const text = textInput.value.trim();
    if(!text || !myName) return;
    if(containsBanned(text)){ textInput.value = ''; return; }
    textInput.value = '';
    await addDoc(messagesRef, { author: myName, text: text, ts: serverTimestamp() });
  }
</script>

</body>
</html>
